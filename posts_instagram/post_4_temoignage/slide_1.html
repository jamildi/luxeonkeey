<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Post 4 — Slide 1</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy:#0B1D3A; --gold:#C9A84C; }

  html, body {
    width: 100%; height: 100%;
    background: var(--navy);
    display: flex; align-items: flex-start; justify-content: flex-start;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    flex-shrink: 0;
    transform-origin: top left;
    position: relative;
    overflow: hidden;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .slide::before {
    content: '';
    position: absolute;
    inset: 64px;
    border: 2px solid rgba(201,168,76,0.75);
    pointer-events: none;
    z-index: 3;
  }
  .slide::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 400px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(201,168,76,0.11) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 96px;
    width: 100%;
  }

  .tag {
    font-size: 20px; font-weight: 500;
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 72px;
  }

  /* Chiffre choc */
  .before-after {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 56px;
  }
  .amount {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .amount-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -2px;
  }
  .amount-num.before { color: rgba(255,255,255,0.30); }
  .amount-num.after  { color: var(--gold); }
  .amount-label {
    font-size: 18px; font-weight: 500;
    letter-spacing: 4px; text-transform: uppercase;
  }
  .amount-label.before { color: rgba(255,255,255,0.25); }
  .amount-label.after  { color: rgba(201,168,76,0.70); }

  .arrow {
    font-size: 56px;
    color: rgba(201,168,76,0.50);
    line-height: 1;
    margin-bottom: 24px;
  }

  .divider {
    width: 80px; height: 1px;
    background: var(--gold);
    margin-bottom: 48px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 68px;
    font-weight: 300;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 12px;
  }
  .headline em {
    color: var(--gold);
    font-style: italic;
  }

  .location {
    font-size: 22px; font-weight: 400;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .num {
    position: absolute; bottom: 88px; left: 88px;
    font-size: 18px; letter-spacing: 4px;
    color: rgba(201,168,76,0.65); font-weight: 400; z-index: 3;
  }
  .swipe {
    position: absolute; bottom: 88px; right: 88px;
    font-size: 18px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(201,168,76,0.85); font-weight: 400; z-index: 3;
  }
</style>
</head>
<body>
<div class="slide" id="slide">
  <div class="inner">
    <div class="tag">Témoignage client &nbsp;·&nbsp; Casablanca</div>

    <div class="before-after">
      <div class="amount">
        <div class="amount-num before">4 000</div>
        <div class="amount-label before">DH / mois avant</div>
      </div>
      <div class="arrow">→</div>
      <div class="amount">
        <div class="amount-num after">11 000</div>
        <div class="amount-label after">DH / mois après</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="headline">
      <em>+175%</em> de revenus<br>sans rien changer au bien.
    </div>

    <div class="location" style="margin-top:32px">Appartement · Maarif · 75 m²</div>
  </div>

  <div class="num">01 / 03</div>
  <div class="swipe">Glissez</div>
</div>
<script>
  function fit() {
    const s = document.getElementById('slide');
    const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1350);
    s.style.transform = `scale(${scale})`;
    s.style.marginLeft = ((window.innerWidth - 1080 * scale) / 2) + 'px';
    s.style.marginTop  = ((window.innerHeight - 1350 * scale) / 2) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
