<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Post 4 — Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy:#0B1D3A; --gold:#C9A84C; }

  html, body {
    width: 100%; height: 100%;
    background: var(--navy);
    display: flex; align-items: flex-start; justify-content: flex-start;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    flex-shrink: 0;
    transform-origin: top left;
    position: relative;
    overflow: hidden;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .slide::before {
    content: '';
    position: absolute;
    inset: 64px;
    border: 2px solid rgba(201,168,76,0.75);
    pointer-events: none; z-index: 3;
  }
  .slide::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 420px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 1;
  }

  .inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 0 96px; width: 100%;
    gap: 0;
  }

  .tag {
    font-size: 20px; font-weight: 500;
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 64px;
  }

  .question {
    font-size: 28px; font-weight: 300;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 96px; font-weight: 300;
    line-height: 1.0; color: #fff;
    margin-bottom: 6px;
  }
  .headline-gold {
    font-family: 'Cormorant Garamond', serif;
    font-size: 96px; font-weight: 300;
    font-style: italic; line-height: 1.05;
    color: var(--gold); margin-bottom: 52px;
  }

  .divider {
    width: 80px; height: 1px;
    background: var(--gold); margin-bottom: 52px;
  }

  /* Bloc CTA encadré */
  .cta-box {
    width: 100%;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.35);
    padding: 52px 56px;
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    position: relative;
  }
  .cta-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.75;
  }
  .cta-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px; font-weight: 300;
    color: #fff; line-height: 1.2; text-align: center;
  }
  .cta-main strong { color: var(--gold); font-weight: 500; }
  .cta-sub {
    font-size: 22px; font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1px; text-align: center;
  }
  .cta-handle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-style: italic;
    color: var(--gold); margin-top: 8px;
  }

  .num {
    position: absolute; bottom: 88px; left: 88px;
    font-size: 18px; letter-spacing: 4px;
    color: rgba(201,168,76,0.65); z-index: 3;
  }
</style>
</head>
<body>
<div class="slide" id="slide">
  <div class="inner">
    <div class="tag">Luxe Onkey &nbsp;·&nbsp; Votre tour</div>

    <div class="question">Et votre bien ?</div>
    <div class="headline">Il a le même</div>
    <div class="headline-gold">potentiel.</div>

    <div class="divider"></div>

    <div class="cta-box">
      <div class="cta-main">Audit gratuit de votre bien<br>en <strong>48h</strong></div>
      <div class="cta-sub">Estimation de revenus · Zéro engagement · 100% offert</div>
      <div class="cta-handle">@luxe.onkey</div>
    </div>
  </div>

  <div class="num">03 / 03</div>
</div>
<script>
  function fit() {
    const s = document.getElementById('slide');
    const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1350);
    s.style.transform = `scale(${scale})`;
    s.style.marginLeft = ((window.innerWidth - 1080 * scale) / 2) + 'px';
    s.style.marginTop  = ((window.innerHeight - 1350 * scale) / 2) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
