<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Post 1 — Slide 1</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy:#0B1D3A; --gold:#C9A84C; }

  html, body {
    width: 100%; height: 100%;
    background: var(--navy);
    display: flex; align-items: flex-start; justify-content: flex-start;
    overflow: hidden;
  }

  /* Le slide est toujours 1080×1350, on le scale via JS */
  .slide {
    width: 1080px;
    height: 1350px;
    flex-shrink: 0;
    transform-origin: top left;
    position: relative;
    overflow: hidden;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .slide::before {
    content: '';
    position: absolute;
    inset: 64px;
    border: 2px solid rgba(201,168,76,0.75);
    pointer-events: none;
  }
  .slide::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 320px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(201,168,76,0.09) 0%, transparent 70%);
    pointer-events: none;
  }

  .inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
  }
  .tag {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 72px;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 120px;
    font-weight: 300;
    line-height: 1.0;
    color: #fff;
    margin-bottom: 10px;
  }
  .headline-gold {
    font-family: 'Cormorant Garamond', serif;
    font-size: 120px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.05;
    color: var(--gold);
    margin-bottom: 60px;
  }
  .divider {
    width: 80px; height: 1px;
    background: var(--gold);
    margin-bottom: 60px;
  }
  .sub {
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 48px;
  }
  .cities {
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.85);
  }
  .num {
    position: absolute;
    bottom: 88px; left: 88px;
    font-size: 18px; letter-spacing: 4px;
    color: rgba(201,168,76,0.65);
    font-weight: 400;
  }
  .swipe {
    position: absolute;
    bottom: 88px; right: 88px;
    font-size: 18px; letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.85);
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="slide" id="slide">
  <div class="inner">
    <div class="tag">Luxe Onkey &nbsp;·&nbsp; Conciergerie Premium</div>
    <div class="headline">Trois ingénieurs.</div>
    <div class="headline-gold">Une obsession.</div>
    <div class="divider"></div>
    <div class="sub">Gestion locative premium au Maroc</div>
    <div class="cities">Casablanca &nbsp;·&nbsp; Rabat &nbsp;·&nbsp; Marrakech &nbsp;·&nbsp; Agadir &nbsp;·&nbsp; Tanger</div>
  </div>
  <div class="num">01 / 03</div>
  <div class="swipe">Glissez</div>
</div>
<script>
  function fit() {
    const s = document.getElementById('slide');
    const scaleX = window.innerWidth / 1080;
    const scaleY = window.innerHeight / 1350;
    const scale = Math.min(scaleX, scaleY);
    s.style.transform = `scale(${scale})`;
    // centre si la fenêtre est plus large que 1080*scale
    s.style.marginLeft = ((window.innerWidth - 1080 * scale) / 2) + 'px';
    s.style.marginTop  = ((window.innerHeight - 1350 * scale) / 2) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
