<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Post 1 — Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy:#0B1D3A; --gold:#C9A84C; }

  html, body {
    width: 100%; height: 100%;
    background: var(--navy);
    display: flex; align-items: flex-start; justify-content: flex-start;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    flex-shrink: 0;
    transform-origin: top left;
    position: relative;
    overflow: hidden;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    padding: 80px 80px 72px;
    font-family: 'Inter', sans-serif;
  }
  .slide::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 300px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .section-label {
    font-size: 20px; font-weight: 500;
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 76px; font-weight: 300;
    line-height: 1.05; color: #fff;
  }
  .title-italic {
    font-family: 'Cormorant Garamond', serif;
    font-size: 76px; font-weight: 300;
    font-style: italic; line-height: 1.1;
    color: var(--gold);
  }
  .rule {
    width: 56px; height: 1px;
    background: var(--gold);
    margin: 24px 0 32px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px; flex: 1;
    margin-bottom: 3px;
  }
  .stat {
    padding: 52px;
    border: 1px solid rgba(201,168,76,0.12);
    background: rgba(255,255,255,0.02);
    display: flex; flex-direction: column;
    justify-content: center; gap: 12px;
    position: relative; overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
    opacity: 0.5;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 120px; font-weight: 300;
    color: var(--gold); line-height: 1;
    letter-spacing: -2px;
  }
  .stat-num sup {
    font-size: 60px; letter-spacing: 0;
    vertical-align: super;
    color: rgba(201,168,76,0.65);
  }
  .stat-lbl {
    font-size: 20px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
  }
  .footer {
    position: relative; z-index: 2;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 40px 0 0;
    border-top: 1px solid rgba(201,168,76,0.2);
  }
  .comm-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; color: #fff;
  }
  .comm-main strong { color: var(--gold); font-weight: 500; }
  .comm-sub {
    font-size: 18px; letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-top: 6px;
  }
  .cta { text-align: right; }
  .cta-label {
    font-size: 18px; letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .cta-handle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-style: italic;
    color: rgba(255,255,255,0.6);
  }
  .num {
    position: absolute; bottom: 48px; left: 80px;
    font-size: 18px; letter-spacing: 4px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<div class="slide" id="slide">
  <div class="section-label">Nos résultats</div>
  <div class="title">Des chiffres qui</div>
  <div class="title-italic">parlent d'eux-mêmes.</div>
  <div class="rule"></div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-num">20<sup>+</sup></div>
      <div class="stat-lbl">Biens gérés au Maroc</div>
    </div>
    <div class="stat">
      <div class="stat-num">4,9<sup>★</sup></div>
      <div class="stat-lbl">Note moyenne Airbnb</div>
    </div>
    <div class="stat">
      <div class="stat-num">+30<sup>%</sup></div>
      <div class="stat-lbl">De revenus générés</div>
    </div>
    <div class="stat">
      <div class="stat-num">0<sup style="font-size:52px">h</sup></div>
      <div class="stat-lbl">De gestion pour vous</div>
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="comm-main"><strong>20% HT</strong> · Tout compris</div>
      <div class="comm-sub">Aucun frais caché · Sans engagement minimum</div>
    </div>
    <div class="cta">
      <div class="cta-label">Audit gratuit</div>
      <div class="cta-handle">@luxe.onkey</div>
    </div>
  </div>

  <div class="num">03 / 03</div>
</div>
<script>
  function fit() {
    const s = document.getElementById('slide');
    const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1350);
    s.style.transform = `scale(${scale})`;
    s.style.marginLeft = ((window.innerWidth - 1080 * scale) / 2) + 'px';
    s.style.marginTop  = ((window.innerHeight - 1350 * scale) / 2) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
