<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" fill="none">
  <defs>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8B6914"/>
      <stop offset="30%"  stop-color="#C9A84C"/>
      <stop offset="60%"  stop-color="#E8CC6A"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
    <linearGradient id="goldKey" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C9A84C"/>
      <stop offset="50%"  stop-color="#F0D878"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="ribbonL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1E4080"/>
      <stop offset="60%"  stop-color="#0D2456"/>
      <stop offset="100%" stop-color="#091836"/>
    </linearGradient>
    <linearGradient id="ribbonR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1E4080"/>
      <stop offset="60%"  stop-color="#0D2456"/>
      <stop offset="100%" stop-color="#091836"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Left ribbon shape (stylized J / open rectangle) -->
  <g filter="url(#shadow)">
    <rect x="4" y="6" width="36" height="54" rx="10" ry="10" fill="url(#ribbonL)"/>
    <rect x="12" y="18" width="20" height="30" rx="5" ry="5" fill="#091836"/>
  </g>

  <!-- Right ribbon shape (offset, overlapping) -->
  <g filter="url(#shadow)">
    <rect x="26" y="6" width="36" height="54" rx="10" ry="10" fill="url(#ribbonR)" opacity="0.95"/>
    <rect x="34" y="18" width="20" height="30" rx="5" ry="5" fill="#091836"/>
  </g>

  <!-- Gold key horizontal -->
  <g filter="url(#shadow)">
    <!-- Key shaft -->
    <rect x="2" y="28" width="62" height="8" rx="4" fill="url(#goldKey)"/>
    <!-- Key head (circle + teeth) -->
    <circle cx="66" cy="32" r="9" fill="url(#goldKey)" stroke="#F0D878" stroke-width="0.5"/>
    <circle cx="66" cy="32" r="5" fill="#0D2456"/>
    <!-- Key teeth -->
    <rect x="14" y="36" width="5" height="6" rx="1.5" fill="url(#goldKey)"/>
    <rect x="25" y="36" width="5" height="6" rx="1.5" fill="url(#goldKey)"/>
    <rect x="36" y="36" width="5" height="6" rx="1.5" fill="url(#goldKey)"/>
  </g>

  <!-- LUXE ONKEY wordmark -->
  <text x="84" y="40" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="700" letter-spacing="3" fill="url(#goldText)">LUXE ONKEY</text>

  <!-- GROUP subtext -->
  <text x="85" y="57" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="500" letter-spacing="5" fill="#3A5A9A" opacity="0.9">GROUP</text>
</svg>
